# ── HTTP → HTTPS redirect ──────────────────────────────────────
server {
    listen 80;
    server_name bersnakx.ru;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name bersnakx.ru;

    ssl_certificate     /etc/letsencrypt/live/bersnakx.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bersnakx.ru/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;

    # ── Frontend (Streamlit) ───────────────────────────────────
    location / {
        proxy_pass         http://frontend:8501;
        proxy_http_version 1.1;

        # WebSocket — обязательно для Streamlit
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
    }

    # ── API Service ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api-service:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting для /api/auth
        limit_req zone=auth_limit burst=10 nodelay;
    }

    # ── pgAdmin ────────────────────────────────────────────────
    location /pgadmin/ {
        proxy_pass         http://pgadmin:80/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Script-Name /pgadmin;
    }
}
